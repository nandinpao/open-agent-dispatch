# Compatibility alternative when an immutable prebuilt OpenClaw image cannot
# yet be produced. The initContainer must finish before the gateway starts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway-init-install-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway-init-install-example
  template:
    metadata:
      labels:
        app: openclaw-gateway-init-install-example
    spec:
      initContainers:
        - name: install-opensocket-plugin
          image: openclaw/openclaw:replace-with-approved-version
          command: ["sh", "-lc", "openclaw plugins install \"${OPENCLAW_PLUGIN_SPEC}\""]
          env:
            - name: OPENCLAW_HOME
              value: /var/lib/openclaw
            - name: OPENCLAW_PLUGIN_SPEC
              valueFrom:
                configMapKeyRef:
                  name: opensocket-plugin-config
                  key: OPENCLAW_PLUGIN_SPEC
          volumeMounts:
            - name: openclaw-data
              mountPath: /var/lib/openclaw
      containers:
        - name: openclaw-gateway
          image: openclaw/openclaw:replace-with-approved-version
          command: ["openclaw", "gateway", "start"]
          env:
            - name: OPENCLAW_HOME
              value: /var/lib/openclaw
          envFrom:
            - configMapRef:
                name: opensocket-plugin-config
          volumeMounts:
            - name: openclaw-data
              mountPath: /var/lib/openclaw
            - name: opensocket-credential
              mountPath: /var/run/secrets/opensocket
              readOnly: true
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: opensocket-credential
          secret:
            secretName: opensocket-plugin-secret
            defaultMode: 0400
            items:
              - key: agent.jwt
                path: agent.jwt
