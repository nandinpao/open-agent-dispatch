name: opensocket-openclaw-plugin-local

services:
  openclaw-plugin-bootstrap:
    image: ${OPENCLAW_IMAGE:-openclaw/openclaw:latest}
    environment:
      OPENCLAW_HOME: /var/lib/openclaw
    volumes:
      - openclaw-data:/var/lib/openclaw
      - ../../:/plugins/openclaw-plugin-opensocket:ro
    command:
      - sh
      - -lc
      - openclaw plugins install --link /plugins/openclaw-plugin-opensocket
    restart: "no"

  openclaw:
    image: ${OPENCLAW_IMAGE:-openclaw/openclaw:latest}
    container_name: openclaw-gateway
    env_file:
      - ../env/opensocket.local.env.example
    environment:
      OPENCLAW_HOME: /var/lib/openclaw
      OPENSOCKET_AUTO_START: ${OPENSOCKET_AUTO_START:-false}
      OPENSOCKET_TASK_STATE_DIRECTORY: /var/lib/openclaw/opensocket-state
      OPENSOCKET_ARTIFACT_DIRECTORY: /var/lib/openclaw/opensocket-artifacts
      OPENSOCKET_OBSERVABILITY_DIRECTORY: /var/lib/openclaw/opensocket-observability
    volumes:
      - openclaw-data:/var/lib/openclaw
      - ../../:/plugins/openclaw-plugin-opensocket:ro
    command: ["openclaw", "gateway", "start"]
    depends_on:
      openclaw-plugin-bootstrap:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ai-event-gateway-netty:
    image: ${AI_EVENT_GATEWAY_NETTY_IMAGE:-opensocket/ai-event-gateway-netty:local}
    container_name: ai-event-gateway-netty
    ports:
      - "18080:18080"
    environment:
      SERVER_PORT: 18080
      OPENSOCKET_AGENT_TOKEN: dev-token-change-me

volumes:
  openclaw-data:
