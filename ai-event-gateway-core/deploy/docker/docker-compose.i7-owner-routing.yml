version: "3.9"
services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    environment:
      POSTGRES_DB: ai_event_gateway
      POSTGRES_USER: ai_event
      POSTGRES_PASSWORD: ai_event
  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
  core:
    image: ${CORE_IMAGE:-ai-event-gateway-core:local}
    depends_on: [postgres, redis]
    ports: ["18080:18080"]
    env_file: [../env/.env.i7-local-integrated.example]
    environment:
      SERVER_PORT: 18080
      DISPATCH_DEFAULT_GATEWAY_BASE_URL: http://netty-node-002:18082
      CORE_RUNTIME_DISCONNECT_DEFAULT_GATEWAY_BASE_URL: http://netty-node-001:18081
      CORE_RUNTIME_DISCONNECT_GATEWAY_NODE_001_BASE_URL: http://netty-node-001:18081
      CORE_RUNTIME_DISCONNECT_GATEWAY_NODE_002_BASE_URL: http://netty-node-002:18082
  netty-node-001:
    image: ${NETTY_IMAGE:-ai-event-gateway-netty:local}
    depends_on: [core]
    ports: ["18081:18081", "19091:19091"]
    env_file: [../env/.env.i7-local-integrated.example]
    environment:
      SERVER_PORT: 18081
      GATEWAY_NODE_ID: gateway-node-001
      GATEWAY_TCP_PORT: 19091
      GATEWAY_CORE_DIRECTORY_SYNC_BASE_URL: http://core:18080
      GATEWAY_CORE_TASK_CALLBACK_RELAY_BASE_URL: http://core:18080
  netty-node-002:
    image: ${NETTY_IMAGE:-ai-event-gateway-netty:local}
    depends_on: [core]
    ports: ["18082:18082", "19092:19092"]
    env_file: [../env/.env.i7-local-integrated.example]
    environment:
      SERVER_PORT: 18082
      GATEWAY_NODE_ID: gateway-node-002
      GATEWAY_TCP_PORT: 19092
      GATEWAY_CORE_DIRECTORY_SYNC_BASE_URL: http://core:18080
      GATEWAY_CORE_TASK_CALLBACK_RELAY_BASE_URL: http://core:18080
