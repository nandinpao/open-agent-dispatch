services:
  core:
    image: ${CORE_IMAGE:-ai-event-gateway-core:local}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,hybrid-worker}
      CORE_OUTBOX_STORE: MYBATIS
      CORE_INTEGRATION_EVENTS_PROJECTION_ENABLED: ${CORE_INTEGRATION_EVENTS_PROJECTION_ENABLED:-true}
      CORE_INTEGRATION_EVENTS_DELIVERY_ENABLED: ${CORE_INTEGRATION_EVENTS_DELIVERY_ENABLED:-false}
      CORE_INTEGRATION_EVENTS_STORE: MYBATIS
      ADAPTER_EXECUTOR_MODE: external
      ADAPTER_EXECUTOR_ENABLED: "false"
    ports:
      - "${CORE_PORT:-18080}:18080"

  adapter-worker:
    image: ${ADAPTER_WORKER_IMAGE:-ai-event-gateway-adapter-worker:local}
    depends_on:
      - core
    environment:
      ADAPTER_WORKER_CORE_BASE_URL: http://core:18080
      ADAPTER_WORKER_ID: ${ADAPTER_WORKER_ID:-adapter-worker-001}
      ADAPTER_WORKER_TYPES: ${ADAPTER_WORKER_TYPES:-MCP,ISSUE_TRACKING}
      ADAPTER_WORKER_TOKEN: ${ADAPTER_WORKER_TOKEN:-}
      ADAPTER_WORKER_MCP_ENDPOINT_URL: ${ADAPTER_WORKER_MCP_ENDPOINT_URL:-}
      ADAPTER_WORKER_ISSUE_ENDPOINT_URL: ${ADAPTER_WORKER_ISSUE_ENDPOINT_URL:-}
      ADAPTER_WORKER_MOCK_SUCCESS_ENABLED: ${ADAPTER_WORKER_MOCK_SUCCESS_ENABLED:-false}
    ports:
      - "${ADAPTER_WORKER_PORT:-18090}:18090"
