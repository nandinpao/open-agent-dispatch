global
  log stdout format raw local0
  maxconn 10000

  ssl-default-bind-options ssl-min-ver TLSv1.2
  ssl-default-server-options ssl-min-ver TLSv1.2

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend otlp_grpc
  bind *:4317
  default_backend otel_gateway_grpc

backend otel_gateway_grpc
  balance leastconn
  option tcp-check
  server gateway-a otel-gateway-a:4317 check inter 2s fall 3 rise 2
  server gateway-b otel-gateway-b:4317 check inter 2s fall 3 rise 2

frontend otlp_http
  bind *:4318
  default_backend otel_gateway_http

backend otel_gateway_http
  balance leastconn
  option tcp-check
  server gateway-a otel-gateway-a:4318 check inter 2s fall 3 rise 2
  server gateway-b otel-gateway-b:4318 check inter 2s fall 3 rise 2

frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 10s
