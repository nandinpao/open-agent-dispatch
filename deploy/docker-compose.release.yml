services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_event_gateway_release}
      POSTGRES_USER: ${POSTGRES_USER:-ai_event_release}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - opendispatch-release-postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 60

  core-db-migrate:
    image: ${FLYWAY_IMAGE:-flyway/flyway:11-alpine}
    entrypoint: ["/bin/sh", "/flyway/diagnostics/flyway-migrate-with-diagnostics.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_event_gateway_release}
      - -user=${POSTGRES_USER:-ai_event_release}
      - -password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - -connectRetries=60
      - -locations=filesystem:/flyway/sql
      - -baselineOnMigrate=false
      - -validateOnMigrate=true
      - migrate
    volumes:
      - ../db/migration:/flyway/sql:ro
      - ../scripts/db/flyway-migrate-with-diagnostics.sh:/flyway/diagnostics/flyway-migrate-with-diagnostics.sh:ro

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - opendispatch-release-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 60

  core:
    image: ${JAVA25_RUNTIME_IMAGE:-eclipse-temurin:25-jre}
    depends_on:
      core-db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    working_dir: /app
    command: ["java", "-jar", "/app/ai-event-gateway-core.jar"]
    volumes:
      - ../runtime/core/ai-event-gateway-core.jar:/app/ai-event-gateway-core.jar:ro
      - ${OPENDISPATCH_LOG_ROOT:-../runtime/logs}/core:/logs
    environment:
      SERVER_PORT: 18080
      CORE_ADMIN_AUTH_ENABLED: ${CORE_ADMIN_AUTH_ENABLED:-true}
      CORE_ADMIN_SESSION_TIMEOUT: ${CORE_ADMIN_SESSION_TIMEOUT:-30m}
      CORE_ADMIN_SESSION_COOKIE_NAME: ${CORE_ADMIN_SESSION_COOKIE_NAME:-OPENDISPATCH_ADMIN_SESSION}
      CORE_ADMIN_SESSION_COOKIE_SECURE: ${CORE_ADMIN_SESSION_COOKIE_SECURE:-true}
      CORE_ADMIN_SESSION_COOKIE_SAME_SITE: ${CORE_ADMIN_SESSION_COOKIE_SAME_SITE:-strict}
      CORE_ADMIN_SESSION_REDIS_NAMESPACE: ${CORE_ADMIN_SESSION_REDIS_NAMESPACE:-opendispatch:core:admin:sessions}
      CORE_ADMIN_BOOTSTRAP_USER_ID: ${CORE_ADMIN_BOOTSTRAP_USER_ID:-admin}
      CORE_ADMIN_BOOTSTRAP_USERNAME: ${CORE_ADMIN_BOOTSTRAP_USERNAME:-admin}
      CORE_ADMIN_BOOTSTRAP_DISPLAY_NAME: ${CORE_ADMIN_BOOTSTRAP_DISPLAY_NAME:-OpenDispatch Administrator}
      CORE_ADMIN_BOOTSTRAP_PASSWORD_HASH: ${CORE_ADMIN_BOOTSTRAP_PASSWORD_HASH:-}
      CORE_ADMIN_BOOTSTRAP_PASSWORD: ${CORE_ADMIN_BOOTSTRAP_PASSWORD:-}
      CORE_ADMIN_BOOTSTRAP_ALLOW_PLAINTEXT_PASSWORD: ${CORE_ADMIN_BOOTSTRAP_ALLOW_PLAINTEXT_PASSWORD:-false}
      CORE_ADMIN_BOOTSTRAP_ROLES: ${CORE_ADMIN_BOOTSTRAP_ROLES:-ADMIN}
      CORE_ADMIN_BOOTSTRAP_ALLOWED_TENANTS: ${CORE_ADMIN_BOOTSTRAP_ALLOWED_TENANTS:-}
      CORE_ADMIN_BOOTSTRAP_DEFAULT_TENANT: ${CORE_ADMIN_BOOTSTRAP_DEFAULT_TENANT:-}
      CORE_EVENT_INTAKE_INTERNAL_TOKEN: ${CORE_EVENT_INTAKE_INTERNAL_TOKEN:-${CLUSTER_INTERNAL_TOKEN:-}}
      LOG_DIR: ${LOG_DIR:-/logs}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_CORE: ${LOG_LEVEL_CORE:-INFO}
      LOG_LEVEL_DISPATCH_TRACE: ${LOG_LEVEL_DISPATCH_TRACE:-INFO}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-50MB}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-2GB}
      SPRING_PROFILES_ACTIVE: ${CORE_PROFILES:-prod}
      FLYWAY_ENABLED: "false"
      DATABASE_PLATFORM_REQUIRE_FLYWAY: "false"
      MANAGEMENT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_HEALTH_SHOW_DETAILS:-never}
      MANAGEMENT_INFO_ENV_ENABLED: ${MANAGEMENT_INFO_ENV_ENABLED:-false}
      PG_ENABLED: "true"
      PG_SINGLE_NAME: single
      PG_SINGLE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_event_gateway_release}
      PG_SINGLE_USERNAME: ${POSTGRES_USER:-ai_event_release}
      PG_SINGLE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PG_SINGLE_IS_DEFAULT: "true"
      PG_SINGLE_DRIVER_CLASS_NAME: org.postgresql.Driver
      PG_MYBATIS_ENABLED: "true"
      REDIS_ENABLED: "true"
      REDIS_MODE: single
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_SINGLE_ADDRESS: "${REDIS_SERVICE_HOST:-redis}:${REDIS_SERVICE_PORT:-6379}"
      SPRING_DATA_REDIS_HOST: ${REDIS_SERVICE_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_SERVICE_PORT:-6379}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_REDIS_HOST: ${REDIS_SERVICE_HOST:-redis}
      SPRING_REDIS_PORT: ${REDIS_SERVICE_PORT:-6379}
      SPRING_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CLUSTER_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:?CLUSTER_INTERNAL_TOKEN is required}
      CORE_INTERNAL_SECURITY_ENABLED: ${CORE_INTERNAL_SECURITY_ENABLED:-true}
      CORE_INTERNAL_PERMIT_ACTUATOR_HEALTH_INFO: ${CORE_INTERNAL_PERMIT_ACTUATOR_HEALTH_INFO:-false}
      CORE_INTERNAL_PROTECT_API_MUTATIONS: ${CORE_INTERNAL_PROTECT_API_MUTATIONS:-true}
      CORE_GATEWAY_INTERNAL_TOKEN: ${CORE_GATEWAY_INTERNAL_TOKEN:?CORE_GATEWAY_INTERNAL_TOKEN is required}
      CORE_ADAPTER_WORKER_INTERNAL_TOKEN: ${CORE_ADAPTER_WORKER_INTERNAL_TOKEN:?CORE_ADAPTER_WORKER_INTERNAL_TOKEN is required}
      CORE_OPERATOR_INTERNAL_TOKEN: ${CORE_OPERATOR_INTERNAL_TOKEN:?CORE_OPERATOR_INTERNAL_TOKEN is required}
      CORE_RECOVERY_OPERATOR_INTERNAL_TOKEN: ${CORE_RECOVERY_OPERATOR_INTERNAL_TOKEN:?CORE_RECOVERY_OPERATOR_INTERNAL_TOKEN is required}
      CORE_RECOVERY_ADMIN_INTERNAL_TOKEN: ${CORE_RECOVERY_ADMIN_INTERNAL_TOKEN:?CORE_RECOVERY_ADMIN_INTERNAL_TOKEN is required}
      CORE_RECOVERY_APPROVER_INTERNAL_TOKEN: ${CORE_RECOVERY_APPROVER_INTERNAL_TOKEN:?CORE_RECOVERY_APPROVER_INTERNAL_TOKEN is required}
      CORE_ACTUATOR_INTERNAL_TOKEN: ${CORE_ACTUATOR_INTERNAL_TOKEN:?CORE_ACTUATOR_INTERNAL_TOKEN is required}
      CORE_INTERNAL_ALLOW_LEGACY_TOKEN_HEADER: ${CORE_INTERNAL_ALLOW_LEGACY_TOKEN_HEADER:-false}
      CORE_INTERNAL_SECURITY_AUDIT_LOG_ENABLED: ${CORE_INTERNAL_SECURITY_AUDIT_LOG_ENABLED:-true}
      CORE_RECOVERY_GOVERNANCE_ENABLED: ${CORE_RECOVERY_GOVERNANCE_ENABLED:-true}
      CORE_RECOVERY_GOVERNANCE_REQUIRE_REASON: ${CORE_RECOVERY_GOVERNANCE_REQUIRE_REASON:-true}
      CORE_RECOVERY_GOVERNANCE_MIN_REASON_LENGTH: ${CORE_RECOVERY_GOVERNANCE_MIN_REASON_LENGTH:-12}
      CORE_RECOVERY_GOVERNANCE_REQUIRE_CONFIRMATION: ${CORE_RECOVERY_GOVERNANCE_REQUIRE_CONFIRMATION:-true}
      CORE_RECOVERY_GOVERNANCE_ALLOW_BODY_OPERATOR_ID_OVERRIDE: ${CORE_RECOVERY_GOVERNANCE_ALLOW_BODY_OPERATOR_ID_OVERRIDE:-false}
      CORE_RECOVERY_GOVERNANCE_REQUIRE_DUAL_CONTROL_FOR_HIGH_RISK: ${CORE_RECOVERY_GOVERNANCE_REQUIRE_DUAL_CONTROL_FOR_HIGH_RISK:-true}
      CORE_RECOVERY_GOVERNANCE_FORBID_SELF_APPROVAL: ${CORE_RECOVERY_GOVERNANCE_FORBID_SELF_APPROVAL:-true}
      CORE_RUNTIME_DISCONNECT_DEFAULT_GATEWAY_BASE_URL: http://netty:18081
      AGENT_ONBOARDING_TOKEN: ${AGENT_ONBOARDING_TOKEN:?AGENT_ONBOARDING_TOKEN is required}
      NETTY_MACHINE_ADMIN_TOKEN: ${NETTY_MACHINE_ADMIN_TOKEN:?NETTY_MACHINE_ADMIN_TOKEN is required}
      CORE_DEFAULT_ROUTING_POLICY: ${CORE_DEFAULT_ROUTING_POLICY:-DOMAIN_AWARE}
      CORE_REMEDIATION_WORKFLOW_METRICS_ENABLED: ${CORE_REMEDIATION_WORKFLOW_METRICS_ENABLED:-true}
      TASK_LIFECYCLE_TIMEOUT_ENABLED: ${TASK_LIFECYCLE_TIMEOUT_ENABLED:-true}
      TASK_LIFECYCLE_AUTO_REASSIGN_ENABLED: ${TASK_LIFECYCLE_AUTO_REASSIGN_ENABLED:-true}
      TASK_LIFECYCLE_SCAN_INTERVAL_MS: ${TASK_LIFECYCLE_SCAN_INTERVAL_MS:-30000}
      TASK_LIFECYCLE_CREATED_TIMEOUT: ${TASK_LIFECYCLE_CREATED_TIMEOUT:-10m}
      TASK_LIFECYCLE_ASSIGNED_TIMEOUT: ${TASK_LIFECYCLE_ASSIGNED_TIMEOUT:-10m}
      TASK_LIFECYCLE_DISPATCHED_TIMEOUT: ${TASK_LIFECYCLE_DISPATCHED_TIMEOUT:-10m}
      TASK_LIFECYCLE_RUNNING_TIMEOUT: ${TASK_LIFECYCLE_RUNNING_TIMEOUT:-30m}
      TASK_LIFECYCLE_MAX_REASSIGNMENTS: ${TASK_LIFECYCLE_MAX_REASSIGNMENTS:-2}
      TASK_LIFECYCLE_MAX_BATCH_SIZE: ${TASK_LIFECYCLE_MAX_BATCH_SIZE:-100}


      # Issue Tracking / Redmine integration
      ISSUE_ACTION_ENABLED: ${ISSUE_ACTION_ENABLED:-false}
      ISSUE_ACTION_CREATE_ON_COMPLETED_TASK: ${ISSUE_ACTION_CREATE_ON_COMPLETED_TASK:-false}
      ISSUE_ACTION_CREATE_ON_FAILED_TASK: ${ISSUE_ACTION_CREATE_ON_FAILED_TASK:-true}
      ISSUE_ACTION_UPDATE_EXISTING_ISSUE_COMMENT: ${ISSUE_ACTION_UPDATE_EXISTING_ISSUE_COMMENT:-true}
      ADAPTER_EXECUTOR_MODE: ${ADAPTER_EXECUTOR_MODE:-disabled}
      ADAPTER_EXECUTOR_ENABLED: ${ADAPTER_EXECUTOR_ENABLED:-false}
      ADAPTER_EXECUTOR_AUTO_EXECUTE_PENDING: ${ADAPTER_EXECUTOR_AUTO_EXECUTE_PENDING:-false}
      ADAPTER_EXECUTOR_AUDIT_STORE: ${ADAPTER_EXECUTOR_AUDIT_STORE:-MYBATIS}
      ISSUE_EXECUTOR_DEFAULT_VENDOR: ${ISSUE_EXECUTOR_DEFAULT_VENDOR:-}
      REDMINE_EXECUTOR_ENABLED: ${REDMINE_EXECUTOR_ENABLED:-false}
      REDMINE_EXECUTOR_BASE_URL: ${REDMINE_EXECUTOR_BASE_URL:-}
      REDMINE_EXECUTOR_API_KEY: ${REDMINE_EXECUTOR_API_KEY:-}
      REDMINE_EXECUTOR_PROJECT_ID: ${REDMINE_EXECUTOR_PROJECT_ID:-}
      REDMINE_EXECUTOR_TRACKER_ID: ${REDMINE_EXECUTOR_TRACKER_ID:-}
      REDMINE_EXECUTOR_NAME: ${REDMINE_EXECUTOR_NAME:-redmine-issue-executor}
      REDMINE_EXECUTOR_ISSUE_URL_TEMPLATE: ${REDMINE_EXECUTOR_ISSUE_URL_TEMPLATE:-}
      REDMINE_EXECUTOR_PRIORITY_CRITICAL: ${REDMINE_EXECUTOR_PRIORITY_CRITICAL:-CRITICAL}
      REDMINE_EXECUTOR_PRIORITY_HIGH: ${REDMINE_EXECUTOR_PRIORITY_HIGH:-HIGH}
      REDMINE_EXECUTOR_PRIORITY_MEDIUM: ${REDMINE_EXECUTOR_PRIORITY_MEDIUM:-MIDDLE}
      REDMINE_EXECUTOR_PRIORITY_LOW: ${REDMINE_EXECUTOR_PRIORITY_LOW:-LOW}
    ports:
      - "${CORE_HTTP_PORT:-18080}:18080"

  netty:
    image: ${JAVA25_RUNTIME_IMAGE:-eclipse-temurin:25-jre}
    depends_on:
      core:
        condition: service_started
    working_dir: /app
    command: ["java", "-jar", "/app/ai-event-gateway-netty.jar"]
    volumes:
      - ../runtime/netty/ai-event-gateway-netty.jar:/app/ai-event-gateway-netty.jar:ro
      - ${OPENDISPATCH_LOG_ROOT:-../runtime/logs}/netty:/logs
    environment:
      SERVER_PORT: 18081
      LOG_DIR: ${LOG_DIR:-/logs}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_GATEWAY: ${LOG_LEVEL_GATEWAY:-INFO}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-50MB}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-2GB}
      SPRING_PROFILES_ACTIVE: ${NETTY_PROFILES:-prod}
      GATEWAY_NODE_ID: ${GATEWAY_NODE_ID:-gateway-node-001}
      GATEWAY_ENVIRONMENT: release
      GATEWAY_TCP_HOST: 0.0.0.0
      GATEWAY_TCP_PORT: 19090
      GATEWAY_WS_HOST: 0.0.0.0
      GATEWAY_WS_PORT: 19091
      GATEWAY_CORE_FORWARD_ENABLED: ${GATEWAY_CORE_FORWARD_ENABLED:-true}
      GATEWAY_CORE_FORWARD_BASE_URL: http://core:18080
      GATEWAY_CORE_FORWARD_AUTH_TOKEN: ${GATEWAY_CORE_FORWARD_AUTH_TOKEN:?GATEWAY_CORE_FORWARD_AUTH_TOKEN is required}
      GATEWAY_CORE_DIRECTORY_SYNC_ENABLED: ${GATEWAY_CORE_DIRECTORY_SYNC_ENABLED:-true}
      GATEWAY_CORE_DIRECTORY_SYNC_BASE_URL: http://core:18080
      GATEWAY_CORE_DIRECTORY_SYNC_AUTH_TOKEN: ${GATEWAY_CORE_DIRECTORY_SYNC_AUTH_TOKEN:?GATEWAY_CORE_DIRECTORY_SYNC_AUTH_TOKEN is required}
      GATEWAY_CORE_TASK_CALLBACK_RELAY_ENABLED: ${GATEWAY_CORE_TASK_CALLBACK_RELAY_ENABLED:-true}
      GATEWAY_CORE_TASK_CALLBACK_RELAY_BASE_URL: http://core:18080
      GATEWAY_CORE_TASK_CALLBACK_RELAY_AUTH_TOKEN: ${GATEWAY_CORE_TASK_CALLBACK_RELAY_AUTH_TOKEN:?GATEWAY_CORE_TASK_CALLBACK_RELAY_AUTH_TOKEN is required}
      GATEWAY_CORE_TASK_CALLBACK_RELAY_SYNCHRONOUS_TERMINAL_CALLBACKS: ${GATEWAY_CORE_TASK_CALLBACK_RELAY_SYNCHRONOUS_TERMINAL_CALLBACKS:-true}
      GATEWAY_AGENT_AUTHORIZATION_ENABLED: ${GATEWAY_AGENT_AUTHORIZATION_ENABLED:-true}
      GATEWAY_AGENT_AUTHORIZATION_FAIL_CLOSED: ${GATEWAY_AGENT_AUTHORIZATION_FAIL_CLOSED:-true}
      GATEWAY_AGENT_AUTHORIZATION_ALLOW_WHEN_DISABLED: ${GATEWAY_AGENT_AUTHORIZATION_ALLOW_WHEN_DISABLED:-false}
      GATEWAY_AGENT_AUTHORIZATION_BASE_URL: http://core:18080
      GATEWAY_AGENT_AUTHORIZATION_AUTH_TOKEN: ${GATEWAY_AGENT_AUTHORIZATION_AUTH_TOKEN:?GATEWAY_AGENT_AUTHORIZATION_AUTH_TOKEN is required}
      AGENT_AUTH_ENABLED: ${AGENT_AUTH_ENABLED:-true}
      AGENT_WS_HANDSHAKE_AUTH_ENABLED: ${AGENT_WS_HANDSHAKE_AUTH_ENABLED:-true}
      NETTY_MACHINE_AUTH_ENABLED: ${NETTY_MACHINE_AUTH_ENABLED:-true}
      NETTY_MACHINE_WS_HANDSHAKE_AUTH_ENABLED: ${NETTY_MACHINE_WS_HANDSHAKE_AUTH_ENABLED:-true}
      CLUSTER_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:?CLUSTER_INTERNAL_TOKEN is required}
      AGENT_ONBOARDING_TOKEN: ${AGENT_ONBOARDING_TOKEN:?AGENT_ONBOARDING_TOKEN is required}
      NETTY_MACHINE_ADMIN_TOKEN: ${NETTY_MACHINE_ADMIN_TOKEN:?NETTY_MACHINE_ADMIN_TOKEN is required}
    ports:
      - "${NETTY_ADMIN_HTTP_PORT:-18081}:18081"
      - "${NETTY_TCP_PORT:-19090}:19090"
      - "${NETTY_WS_PORT:-19091}:19091"

  admin-ui:
    image: ${NODE_RUNTIME_IMAGE:-node:22-bookworm-slim}
    depends_on:
      core:
        condition: service_started
      netty:
        condition: service_started
    working_dir: /workspace/admin-ui
    command:
      - sh
      - ./scripts/opendispatch-admin-ui-runtime-entrypoint.sh
    volumes:
      - ../runtime/admin-ui:/workspace/admin-ui:ro
      - opendispatch-release-admin-ui-node-modules:/workspace/admin-ui/node_modules
      - ${OPENDISPATCH_LOG_ROOT:-../runtime/logs}/admin-ui:/workspace/logs
    environment:
      NODE_ENV: production
      PORT: ${ADMIN_UI_CONTAINER_PORT:-3000}
      HOSTNAME: 0.0.0.0
      ADMIN_UI_ALLOW_NPM_CI: ${ADMIN_UI_ALLOW_NPM_CI:-true}
      ADMIN_UI_DEPS_ARCHIVE: /workspace/admin-ui/node_modules-prod.tar.gz
      CORE_BACKEND_ORIGIN: http://core:18080
      NETTY_BACKEND_ORIGIN: http://netty:18081
      NETTY_MACHINE_ADMIN_TOKEN: ${NETTY_MACHINE_ADMIN_TOKEN:?NETTY_MACHINE_ADMIN_TOKEN is required}
      GATEWAY_BACKEND_ORIGIN: http://netty:18081
      CORE_BACKEND_OPERATOR_TOKEN: ${CORE_OPERATOR_INTERNAL_TOKEN:?CORE_OPERATOR_INTERNAL_TOKEN is required}
      CORE_BACKEND_RECOVERY_OPERATOR_TOKEN: ${CORE_RECOVERY_OPERATOR_INTERNAL_TOKEN:?CORE_RECOVERY_OPERATOR_INTERNAL_TOKEN is required}
      CORE_BACKEND_RECOVERY_ADMIN_TOKEN: ${CORE_RECOVERY_ADMIN_INTERNAL_TOKEN:?CORE_RECOVERY_ADMIN_INTERNAL_TOKEN is required}
      CORE_BACKEND_RECOVERY_APPROVER_TOKEN: ${CORE_RECOVERY_APPROVER_INTERNAL_TOKEN:?CORE_RECOVERY_APPROVER_INTERNAL_TOKEN is required}
      CORE_FORWARD_BROWSER_AUTHORIZATION: ${CORE_FORWARD_BROWSER_AUTHORIZATION:-false}
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-AI Event Gateway Admin}"
      NEXT_PUBLIC_ADMIN_BACKEND_MODE: ${NEXT_PUBLIC_ADMIN_BACKEND_MODE:-dual}
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
      ADMIN_UI_SECURITY_PROFILE: ${ADMIN_UI_SECURITY_PROFILE:-prod}
      ADMIN_UI_FAIL_CLOSED: ${ADMIN_UI_FAIL_CLOSED:-true}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-true}
      ADMIN_UI_COOKIE_SECURE: ${ADMIN_UI_COOKIE_SECURE:-true}
      NEXT_PUBLIC_CORE_API_BASE_URL: ${NEXT_PUBLIC_CORE_API_BASE_URL:-/core-api}
      NEXT_PUBLIC_NETTY_API_BASE_URL: ${NEXT_PUBLIC_NETTY_API_BASE_URL:-/netty-api}
      NEXT_PUBLIC_GATEWAY_API_BASE_URL: ${NEXT_PUBLIC_GATEWAY_API_BASE_URL:-/netty-api}
    ports:
      - "${ADMIN_UI_HTTP_PORT:-3000}:${ADMIN_UI_CONTAINER_PORT:-3000}"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s

volumes:
  opendispatch-release-postgres18-data:
  opendispatch-release-redis-data:
  opendispatch-release-admin-ui-node-modules:
