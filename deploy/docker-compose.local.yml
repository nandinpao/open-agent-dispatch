services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_event_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-ai_event}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_event}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-15432}:5432"
    volumes:
      - opendispatch-postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_event} -d ${POSTGRES_DB:-ai_event_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 30

  core-db-migrate:
    image: ${FLYWAY_IMAGE:-flyway/flyway:11-alpine}
    entrypoint: ["/bin/sh", "/flyway/diagnostics/flyway-migrate-with-diagnostics.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_event_gateway}
      - -user=${POSTGRES_USER:-ai_event}
      - -password=${POSTGRES_PASSWORD:-ai_event}
      - -connectRetries=60
      - -locations=filesystem:/flyway/sql
      - -baselineOnMigrate=false
      - -validateOnMigrate=true
      - migrate
    volumes:
      - opendispatch-db-migration-sql:/flyway/sql:ro
      - opendispatch-db-migration-diagnostics:/flyway/diagnostics:ro

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    ports:
      - "${REDIS_PUBLIC_PORT:-16379}:6379"
    volumes:
      - opendispatch-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.156.0}
    command: ["--config=/etc/otelcol-contrib/config/config.yaml"]
    volumes:
      - opendispatch-otel-collector-config:/etc/otelcol-contrib/config:ro
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-14317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-14318}:4318"
      - "${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"
    restart: unless-stopped

  core:
    image: ${JAVA25_RUNTIME_IMAGE:-eclipse-temurin:25-jre}
    depends_on:
      otel-collector:
        condition: service_started
      core-db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    working_dir: /app
    command: ["java", "-jar", "/app/ai-event-gateway-core.jar"]
    volumes:
      - opendispatch-core-runtime:/app:ro
      - opendispatch-core-logs:/logs
    environment:
      LOG_DIR: ${LOG_DIR:-/logs}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_CORE: ${LOG_LEVEL_CORE:-INFO}
      LOG_LEVEL_DISPATCH_TRACE: ${LOG_LEVEL_DISPATCH_TRACE:-DEBUG}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-50MB}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-2GB}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED: ${MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED:-true}
      MANAGEMENT_TRACING_PROPAGATION_CONSUME: ${MANAGEMENT_TRACING_PROPAGATION_CONSUME:-w3c,b3}
      MANAGEMENT_TRACING_PROPAGATION_PRODUCE: ${MANAGEMENT_TRACING_PROPAGATION_PRODUCE:-w3c}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_TRACES_SCHEDULE_DELAY: ${OTEL_TRACES_SCHEDULE_DELAY:-1s}
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:-true}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-http://otel-collector:4318/v1/metrics}
      OTEL_METRICS_EXPORT_STEP: ${OTEL_METRICS_EXPORT_STEP:-5s}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-opendispatch}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-local-dev}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
      SPRING_PROFILES_ACTIVE: ${CORE_PROFILES:-local,postgres,redis}
      SERVER_PORT: 18080
      CORE_ADMIN_AUTH_ENABLED: ${CORE_ADMIN_AUTH_ENABLED:-true}
      CORE_ADMIN_SESSION_TIMEOUT: ${CORE_ADMIN_SESSION_TIMEOUT:-30m}
      CORE_ADMIN_SESSION_COOKIE_NAME: ${CORE_ADMIN_SESSION_COOKIE_NAME:-OPENDISPATCH_ADMIN_SESSION}
      CORE_ADMIN_SESSION_COOKIE_SECURE: ${CORE_ADMIN_SESSION_COOKIE_SECURE:-false}
      CORE_ADMIN_SESSION_COOKIE_SAME_SITE: ${CORE_ADMIN_SESSION_COOKIE_SAME_SITE:-lax}
      CORE_ADMIN_SESSION_REDIS_NAMESPACE: ${CORE_ADMIN_SESSION_REDIS_NAMESPACE:-opendispatch:core:admin:sessions}
      CORE_ADMIN_BOOTSTRAP_USER_ID: ${CORE_ADMIN_BOOTSTRAP_USER_ID:-admin}
      CORE_ADMIN_BOOTSTRAP_USERNAME: ${CORE_ADMIN_BOOTSTRAP_USERNAME:-admin}
      CORE_ADMIN_BOOTSTRAP_DISPLAY_NAME: ${CORE_ADMIN_BOOTSTRAP_DISPLAY_NAME:-OpenDispatch Administrator}
      CORE_ADMIN_BOOTSTRAP_PASSWORD_HASH: ${CORE_ADMIN_BOOTSTRAP_PASSWORD_HASH:-}
      CORE_ADMIN_BOOTSTRAP_PASSWORD: ${CORE_ADMIN_BOOTSTRAP_PASSWORD:-local-admin-change-me}
      CORE_ADMIN_BOOTSTRAP_ALLOW_PLAINTEXT_PASSWORD: ${CORE_ADMIN_BOOTSTRAP_ALLOW_PLAINTEXT_PASSWORD:-true}
      CORE_ADMIN_BOOTSTRAP_ROLES: ${CORE_ADMIN_BOOTSTRAP_ROLES:-ADMIN}
      CORE_ADMIN_BOOTSTRAP_ALLOWED_TENANTS: ${CORE_ADMIN_BOOTSTRAP_ALLOWED_TENANTS:-tenant-a}
      CORE_ADMIN_BOOTSTRAP_DEFAULT_TENANT: ${CORE_ADMIN_BOOTSTRAP_DEFAULT_TENANT:-tenant-a}
      CORE_ADMIN_BOOTSTRAP_ENABLED: ${CORE_ADMIN_BOOTSTRAP_ENABLED:-true}
      CORE_ADMIN_E2E_ADMIN_ENABLED: ${CORE_ADMIN_E2E_ADMIN_ENABLED:-false}
      CORE_ADMIN_E2E_ADMIN_USERNAME: ${CORE_ADMIN_E2E_ADMIN_USERNAME:-admin-e2e}
      CORE_ADMIN_E2E_ADMIN_PASSWORD: ${CORE_ADMIN_E2E_ADMIN_PASSWORD:-admin-e2e-password}
      CORE_ADMIN_E2E_ADMIN_ALLOW_PLAINTEXT: "true"
      CORE_ADMIN_E2E_ADMIN_TENANTS: ${CORE_ADMIN_E2E_ADMIN_TENANTS:-tenant-a,tenant-b}
      CORE_ADMIN_E2E_ADMIN_DEFAULT_TENANT: ${CORE_ADMIN_E2E_ADMIN_DEFAULT_TENANT:-tenant-a}
      CORE_ADMIN_E2E_OPERATOR_ENABLED: ${CORE_ADMIN_E2E_OPERATOR_ENABLED:-false}
      CORE_ADMIN_E2E_OPERATOR_USERNAME: ${CORE_ADMIN_E2E_OPERATOR_USERNAME:-operator-e2e}
      CORE_ADMIN_E2E_OPERATOR_PASSWORD: ${CORE_ADMIN_E2E_OPERATOR_PASSWORD:-operator-e2e-password}
      CORE_ADMIN_E2E_OPERATOR_ALLOW_PLAINTEXT: "true"
      CORE_ADMIN_E2E_OPERATOR_TENANTS: ${CORE_ADMIN_E2E_OPERATOR_TENANTS:-tenant-a,tenant-b}
      CORE_ADMIN_E2E_OPERATOR_DEFAULT_TENANT: ${CORE_ADMIN_E2E_OPERATOR_DEFAULT_TENANT:-tenant-a}
      CORE_ADMIN_E2E_VIEWER_ENABLED: ${CORE_ADMIN_E2E_VIEWER_ENABLED:-false}
      CORE_ADMIN_E2E_VIEWER_USERNAME: ${CORE_ADMIN_E2E_VIEWER_USERNAME:-viewer-e2e}
      CORE_ADMIN_E2E_VIEWER_PASSWORD: ${CORE_ADMIN_E2E_VIEWER_PASSWORD:-viewer-e2e-password}
      CORE_ADMIN_E2E_VIEWER_ALLOW_PLAINTEXT: "true"
      CORE_ADMIN_E2E_VIEWER_TENANTS: ${CORE_ADMIN_E2E_VIEWER_TENANTS:-tenant-a,tenant-b}
      CORE_ADMIN_E2E_VIEWER_DEFAULT_TENANT: ${CORE_ADMIN_E2E_VIEWER_DEFAULT_TENANT:-tenant-a}
      CORE_EVENT_INTAKE_INTERNAL_TOKEN: ${CORE_EVENT_INTAKE_INTERNAL_TOKEN:-${CLUSTER_INTERNAL_TOKEN:-}}

      PG_ENABLED: "true"
      PG_MYBATIS_ENABLED: "true"
      PG_SINGLE_NAME: single
      PG_SINGLE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_event_gateway}
      PG_SINGLE_USERNAME: ${POSTGRES_USER:-ai_event}
      PG_SINGLE_PASSWORD: ${POSTGRES_PASSWORD:-ai_event}
      PG_SINGLE_IS_DEFAULT: "true"
      PG_SINGLE_DRIVER_CLASS_NAME: org.postgresql.Driver
      PG_SINGLE_HIKARI_MINIMUM_IDLE: 2
      PG_SINGLE_HIKARI_MAXIMUM_POOL_SIZE: 10
      FLYWAY_ENABLED: "false"

      REDIS_ENABLED: "true"
      REDIS_MODE: single
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      REDIS_PASSWORD: ""
      REDIS_SINGLE_ADDRESS: "${REDIS_SERVICE_HOST:-redis}:${REDIS_SERVICE_PORT:-6379}"
      SPRING_DATA_REDIS_HOST: "${REDIS_SERVICE_HOST:-redis}"
      SPRING_DATA_REDIS_PORT: "${REDIS_SERVICE_PORT:-6379}"
      SPRING_DATA_REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      SPRING_REDIS_HOST: "${REDIS_SERVICE_HOST:-redis}"
      SPRING_REDIS_PORT: "${REDIS_SERVICE_PORT:-6379}"
      SPRING_REDIS_DATABASE: "${REDIS_DATABASE:-0}"

      CORE_TASK_CREATION_ENABLED: "true"
      CORE_TASK_MIN_OCCURRENCES: "1"
      CORE_IMMEDIATE_TASK_SEVERITIES: "CRITICAL,HIGH"
      CORE_DEFAULT_ROUTING_POLICY: ${CORE_DEFAULT_ROUTING_POLICY:-DOMAIN_AWARE}
      ROUTING_ASSIGNMENT_ENABLED: "true"
      DISPATCH_REQUEST_CREATION_ENABLED: "true"
      # Stage 8 standard delivery gate still verifies the direct assignment -> dispatch request -> Netty -> Agent ACK/RESULT path.
      DISPATCH_REVIEW_MODE: AUTO_APPROVE
      DISPATCH_CLIENT_ENABLED: "true"
      DISPATCH_CLIENT_AUTO_EXECUTE_APPROVED: "true"
      DISPATCH_EXECUTION_POLICY: "AUTO_AFTER_ASSIGNMENT"
      DISPATCH_DEFAULT_GATEWAY_BASE_URL: http://netty:18081
      DISPATCH_GATEWAY_DISPATCH_PATH: /internal/delivery/agents/{agentId}/commands
      DISPATCH_INTERNAL_TOKEN_HEADER: X-Cluster-Token
      DISPATCH_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}

      TASK_CALLBACK_IDEMPOTENCY_ENABLED: "true"
      TASK_CALLBACK_REPLAY_PROTECTION_ENABLED: "true"
      TASK_CALLBACK_REJECT_REPLAY_MISMATCH: "true"
      DISPATCH_RETRY_JITTER_PERCENT: "20"
      DISPATCH_RECOVERY_JITTER_PERCENT: "20"
      DISPATCH_RUNTIME_BACKOFF_JITTER_PERCENT: "20"
      DISPATCH_POISON_AGENT_FAILURE_THRESHOLD: "5"
      TASK_LIFECYCLE_TIMEOUT_ENABLED: ${TASK_LIFECYCLE_TIMEOUT_ENABLED:-true}
      TASK_LIFECYCLE_AUTO_REASSIGN_ENABLED: ${TASK_LIFECYCLE_AUTO_REASSIGN_ENABLED:-true}
      TASK_LIFECYCLE_SCAN_INTERVAL_MS: ${TASK_LIFECYCLE_SCAN_INTERVAL_MS:-5000}
      TASK_LIFECYCLE_CREATED_TIMEOUT: ${TASK_LIFECYCLE_CREATED_TIMEOUT:-45s}
      TASK_LIFECYCLE_ASSIGNED_TIMEOUT: ${TASK_LIFECYCLE_ASSIGNED_TIMEOUT:-45s}
      TASK_LIFECYCLE_DISPATCHED_TIMEOUT: ${TASK_LIFECYCLE_DISPATCHED_TIMEOUT:-45s}
      TASK_LIFECYCLE_RUNNING_TIMEOUT: ${TASK_LIFECYCLE_RUNNING_TIMEOUT:-60s}
      TASK_LIFECYCLE_MAX_REASSIGNMENTS: ${TASK_LIFECYCLE_MAX_REASSIGNMENTS:-5}
      TASK_LIFECYCLE_MAX_BATCH_SIZE: ${TASK_LIFECYCLE_MAX_BATCH_SIZE:-100}

      AGENT_REMEDIATION_STALE_LEASE_REAPER_ENABLED: "true"
      AGENT_REMEDIATION_STALE_LEASE_REAPER_FIXED_DELAY_MS: "60000"
      AGENT_REMEDIATION_STALE_LEASE_REAPER_INITIAL_DELAY_MS: "30000"
      AGENT_REMEDIATION_STALE_LEASE_REAPER_LIMIT: "100"
      CORE_REMEDIATION_WORKFLOW_METRICS_ENABLED: "true"
      CORE_REMEDIATION_STALE_LEASE_ALERT_WINDOW: "10m"
      CORE_REMEDIATION_APPROVAL_LATENCY_WARNING: "30m"
      CORE_REMEDIATION_APPROVAL_LATENCY_CRITICAL: "2h"
      CORE_REMEDIATION_ACTION_FAILURE_RATIO_WARNING: "0.20"
      CORE_REMEDIATION_ACTION_FAILURE_RATIO_CRITICAL: "0.50"

      CORE_INTERNAL_SECURITY_ENABLED: ${CORE_INTERNAL_SECURITY_ENABLED:-true}
      CORE_INTERNAL_PROTECT_API_MUTATIONS: ${CORE_INTERNAL_PROTECT_API_MUTATIONS:-false}
      CORE_GATEWAY_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
      CORE_OPERATOR_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
      CORE_ACTUATOR_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
      CORE_RUNTIME_DISCONNECT_DEFAULT_GATEWAY_BASE_URL: http://netty:18081
      CORE_RUNTIME_DISCONNECT_GATEWAY_NODE_001_BASE_URL: http://netty:18081
      CORE_RUNTIME_DISCONNECT_ADMIN_TOKEN: ${NETTY_MACHINE_ADMIN_TOKEN:-local-netty-machine-admin-token-change-me}

      # Issue Tracking / Redmine local integration
      ISSUE_ACTION_ENABLED: ${ISSUE_ACTION_ENABLED:-false}
      ISSUE_ACTION_CREATE_ON_COMPLETED_TASK: ${ISSUE_ACTION_CREATE_ON_COMPLETED_TASK:-false}
      ISSUE_ACTION_CREATE_ON_FAILED_TASK: ${ISSUE_ACTION_CREATE_ON_FAILED_TASK:-true}
      ISSUE_ACTION_UPDATE_EXISTING_ISSUE_COMMENT: ${ISSUE_ACTION_UPDATE_EXISTING_ISSUE_COMMENT:-true}
      ADAPTER_EXECUTOR_MODE: ${ADAPTER_EXECUTOR_MODE:-disabled}
      ADAPTER_EXECUTOR_ENABLED: ${ADAPTER_EXECUTOR_ENABLED:-false}
      ADAPTER_EXECUTOR_AUTO_EXECUTE_PENDING: ${ADAPTER_EXECUTOR_AUTO_EXECUTE_PENDING:-false}
      ADAPTER_EXECUTOR_AUDIT_STORE: ${ADAPTER_EXECUTOR_AUDIT_STORE:-MYBATIS}
      ISSUE_EXECUTOR_DEFAULT_VENDOR: ${ISSUE_EXECUTOR_DEFAULT_VENDOR:-}
      REDMINE_EXECUTOR_ENABLED: ${REDMINE_EXECUTOR_ENABLED:-false}
      REDMINE_EXECUTOR_BASE_URL: ${REDMINE_EXECUTOR_BASE_URL:-}
      REDMINE_EXECUTOR_API_KEY: ${REDMINE_EXECUTOR_API_KEY:-}
      REDMINE_EXECUTOR_PROJECT_ID: ${REDMINE_EXECUTOR_PROJECT_ID:-}
      REDMINE_EXECUTOR_TRACKER_ID: ${REDMINE_EXECUTOR_TRACKER_ID:-}
      REDMINE_EXECUTOR_NAME: ${REDMINE_EXECUTOR_NAME:-redmine-issue-executor}
      REDMINE_EXECUTOR_ISSUE_URL_TEMPLATE: ${REDMINE_EXECUTOR_ISSUE_URL_TEMPLATE:-}
      REDMINE_EXECUTOR_PRIORITY_CRITICAL: ${REDMINE_EXECUTOR_PRIORITY_CRITICAL:-CRITICAL}
      REDMINE_EXECUTOR_PRIORITY_HIGH: ${REDMINE_EXECUTOR_PRIORITY_HIGH:-HIGH}
      REDMINE_EXECUTOR_PRIORITY_MEDIUM: ${REDMINE_EXECUTOR_PRIORITY_MEDIUM:-MIDDLE}
      REDMINE_EXECUTOR_PRIORITY_LOW: ${REDMINE_EXECUTOR_PRIORITY_LOW:-LOW}
    ports:
      - "${CORE_HTTP_PORT:-18080}:18080"

  netty:
    image: ${JAVA25_RUNTIME_IMAGE:-eclipse-temurin:25-jre}
    depends_on:
      core:
        condition: service_started
      otel-collector:
        condition: service_started
    working_dir: /app
    command: ["java", "-jar", "/app/ai-event-gateway-netty.jar"]
    volumes:
      - opendispatch-netty-runtime:/app:ro
      - opendispatch-netty-logs:/logs
    environment:
      LOG_DIR: ${LOG_DIR:-/logs}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_GATEWAY: ${LOG_LEVEL_GATEWAY:-DEBUG}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-50MB}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-2GB}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED: ${MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED:-true}
      MANAGEMENT_TRACING_PROPAGATION_CONSUME: ${MANAGEMENT_TRACING_PROPAGATION_CONSUME:-w3c,b3}
      MANAGEMENT_TRACING_PROPAGATION_PRODUCE: ${MANAGEMENT_TRACING_PROPAGATION_PRODUCE:-w3c}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_TRACES_SCHEDULE_DELAY: ${OTEL_TRACES_SCHEDULE_DELAY:-1s}
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:-true}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-http://otel-collector:4318/v1/metrics}
      OTEL_METRICS_EXPORT_STEP: ${OTEL_METRICS_EXPORT_STEP:-5s}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-opendispatch}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-local-dev}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
      SPRING_PROFILES_ACTIVE: ${NETTY_PROFILES:-docker}
      SERVER_PORT: 18081
      GATEWAY_NODE_ID: gateway-node-001
      GATEWAY_ENVIRONMENT: local-docker
      GATEWAY_TCP_HOST: 0.0.0.0
      GATEWAY_TCP_PORT: 19090
      GATEWAY_WS_HOST: 0.0.0.0
      GATEWAY_WS_PORT: 19091
      GATEWAY_CORE_DIRECTORY_SYNC_ENABLED: "true"
      GATEWAY_CORE_DIRECTORY_SYNC_BASE_URL: http://core:18080
      GATEWAY_CORE_DIRECTORY_SYNC_AUTH_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
      GATEWAY_CORE_TASK_CALLBACK_RELAY_ENABLED: "true"
      GATEWAY_CORE_TASK_CALLBACK_RELAY_BASE_URL: http://core:18080
      GATEWAY_CORE_TASK_CALLBACK_RELAY_AUTH_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
      GATEWAY_CORE_TASK_CALLBACK_RELAY_SYNCHRONOUS_TERMINAL_CALLBACKS: ${GATEWAY_CORE_TASK_CALLBACK_RELAY_SYNCHRONOUS_TERMINAL_CALLBACKS:-true}
      GATEWAY_CORE_FORWARD_BASE_URL: http://core:18080
      GATEWAY_AGENT_AUTHORIZATION_ENABLED: ${GATEWAY_AGENT_AUTHORIZATION_ENABLED:-true}
      GATEWAY_AGENT_AUTHORIZATION_BASE_URL: http://core:18080
      GATEWAY_AGENT_AUTHORIZATION_ALLOW_WHEN_DISABLED: ${GATEWAY_AGENT_AUTHORIZATION_ALLOW_WHEN_DISABLED:-false}
      GATEWAY_AGENT_AUTHORIZATION_AUTH_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
      AGENT_AUTH_ENABLED: "false"
      AGENT_ONBOARDING_TOKEN: ${AGENT_ONBOARDING_TOKEN:-local-agent-onboarding-token-change-me}
      NETTY_MACHINE_AUTH_ENABLED: "false"
      NETTY_MACHINE_ADMIN_TOKEN: ${NETTY_MACHINE_ADMIN_TOKEN:-local-netty-machine-admin-token-change-me}
      ADMIN_CORS_ALLOWED_ORIGINS: ${ADMIN_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS: "${ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS:-http://*:[3000],https://*:[3000]}"
      CLUSTER_INTERNAL_TOKEN: ${CLUSTER_INTERNAL_TOKEN:-local-cluster-token-change-me}
    ports:
      - "${NETTY_ADMIN_HTTP_PORT:-18081}:18081"
      - "${NETTY_TCP_PORT:-19090}:19090"
      - "${NETTY_WS_PORT:-19091}:19091"

  adapter-worker:
    profiles: ["observability-smoke"]
    image: ${JAVA25_RUNTIME_IMAGE:-eclipse-temurin:25-jre}
    depends_on:
      core:
        condition: service_started
      otel-collector:
        condition: service_started
    working_dir: /app
    command: ["java", "-jar", "/app/ai-event-gateway-adapter-worker.jar"]
    volumes:
      - opendispatch-adapter-worker-runtime:/app:ro
      - opendispatch-adapter-worker-logs:/logs
    environment:
      LOG_DIR: ${LOG_DIR:-/logs}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED: ${MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED:-true}
      MANAGEMENT_TRACING_PROPAGATION_CONSUME: ${MANAGEMENT_TRACING_PROPAGATION_CONSUME:-w3c,b3}
      MANAGEMENT_TRACING_PROPAGATION_PRODUCE: ${MANAGEMENT_TRACING_PROPAGATION_PRODUCE:-w3c}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_TRACES_SCHEDULE_DELAY: ${OTEL_TRACES_SCHEDULE_DELAY:-1s}
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:-true}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-http://otel-collector:4318/v1/metrics}
      OTEL_METRICS_EXPORT_STEP: ${OTEL_METRICS_EXPORT_STEP:-5s}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-opendispatch}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-local-dev}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
      ADAPTER_WORKER_PORT: 18090
      ADAPTER_WORKER_ENABLED: "false"
      ADAPTER_WORKER_CORE_BASE_URL: http://core:18080
      ADAPTER_WORKER_ID: adapter-worker-otel-smoke
      ADAPTER_WORKER_TOKEN: ${ADAPTER_WORKER_TOKEN:-local-cluster-token-change-me}
    ports:
      - "${ADAPTER_WORKER_HTTP_PORT:-18090}:18090"

  admin-ui:
    image: ${NODE_RUNTIME_IMAGE:-node:22-bookworm-slim}
    depends_on:
      core:
        condition: service_started
      netty:
        condition: service_started
    working_dir: /workspace/admin-ui
    command:
      - sh
      - ./scripts/opendispatch-admin-ui-runtime-entrypoint.sh
    volumes:
      - opendispatch-admin-ui-runtime:/workspace/admin-ui:ro
      - opendispatch-admin-ui-node-modules:/workspace/admin-ui/node_modules
      - opendispatch-admin-ui-logs:/workspace/logs
    environment:
      NODE_ENV: production
      PORT: ${ADMIN_UI_CONTAINER_PORT:-3000}
      HOSTNAME: 0.0.0.0
      ADMIN_UI_ALLOW_NPM_CI: "false"
      ADMIN_UI_DEPS_ARCHIVE: /workspace/admin-ui/node_modules-prod.tar.gz
      ADMIN_UI_SECURITY_PROFILE: ${ADMIN_UI_SECURITY_PROFILE:-local}
      ADMIN_UI_FAIL_CLOSED: ${ADMIN_UI_FAIL_CLOSED:-false}
      CORE_BACKEND_ORIGIN: http://core:18080
      CORE_BACKEND_FALLBACK_ORIGINS: ${CORE_BACKEND_FALLBACK_ORIGINS:-http://host.docker.internal:18080}
      OPENDISPATCH_PUBLIC_HOST: ${OPENDISPATCH_PUBLIC_HOST:-}
      OPENDISPATCH_PUBLIC_SCHEME: ${OPENDISPATCH_PUBLIC_SCHEME:-http}
      CORE_HTTP_PORT: ${CORE_HTTP_PORT:-18080}
      NETTY_ADMIN_HTTP_PORT: ${NETTY_ADMIN_HTTP_PORT:-18081}
      ADMIN_UI_BACKEND_CONNECT_TIMEOUT_MS: ${ADMIN_UI_BACKEND_CONNECT_TIMEOUT_MS:-2500}
      ADMIN_UI_CORE_STARTUP_TIMEOUT_MS: ${ADMIN_UI_CORE_STARTUP_TIMEOUT_MS:-120000}
      NETTY_BACKEND_ORIGIN: http://netty:18081
      NETTY_MACHINE_ADMIN_TOKEN: ${NETTY_MACHINE_ADMIN_TOKEN:-local-netty-machine-admin-token-change-me}
      GATEWAY_BACKEND_ORIGIN: http://netty:18081
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-AI Event Gateway Admin}"
      NEXT_PUBLIC_ADMIN_BACKEND_MODE: ${NEXT_PUBLIC_ADMIN_BACKEND_MODE:-dual}
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-true}
      ADMIN_UI_COOKIE_SECURE: ${ADMIN_UI_COOKIE_SECURE:-false}
      NEXT_PUBLIC_CORE_API_BASE_URL: ${NEXT_PUBLIC_CORE_API_BASE_URL:-/core-api}
      NEXT_PUBLIC_NETTY_API_BASE_URL: ${NEXT_PUBLIC_NETTY_API_BASE_URL:-/netty-api}
      NEXT_PUBLIC_GATEWAY_API_BASE_URL: ${NEXT_PUBLIC_GATEWAY_API_BASE_URL:-/netty-api}
      NEXT_PUBLIC_NETTY_RUNTIME_WS_URL: ${NEXT_PUBLIC_NETTY_RUNTIME_WS_URL:-/api/admin/runtime/stream}
      NEXT_PUBLIC_GATEWAY_WS_URL: ${NEXT_PUBLIC_GATEWAY_WS_URL:-/api/admin/runtime/stream}
      NEXT_PUBLIC_REFRESH_INTERVAL_MS: ${NEXT_PUBLIC_REFRESH_INTERVAL_MS:-5000}
      NEXT_PUBLIC_REQUEST_TIMEOUT_MS: ${NEXT_PUBLIC_REQUEST_TIMEOUT_MS:-10000}
      NEXT_PUBLIC_API_CONTRACT_MODE: ${NEXT_PUBLIC_API_CONTRACT_MODE:-warn}
    ports:
      - "${ADMIN_UI_HTTP_PORT:-3000}:${ADMIN_UI_CONTAINER_PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s


  mock-agent:
    image: python:3.13-alpine
    profiles: ["agent"]
    restart: unless-stopped
    depends_on:
      netty:
        condition: service_started
    volumes:
      - opendispatch-mock-agent-e2e:/e2e:ro
    environment:
      AGENT_ONBOARDING_TOKEN: ${AGENT_ONBOARDING_TOKEN:-local-agent-onboarding-token-change-me}
      I6_AGENT_MIN_DISPATCHES: 0
      I6_AGENT_EXIT_AFTER_DISPATCH: 0
      I6_AGENT_HEARTBEAT_INTERVAL_SECONDS: 5
    command:
      - python
      - /e2e/mock_task_agent.py
      - --gateway-host
      - netty
      - --gateway-tcp-port
      - "19090"
      - --gateway-node-id
      - gateway-node-001
      - --agent-id
      - agent-local-001

