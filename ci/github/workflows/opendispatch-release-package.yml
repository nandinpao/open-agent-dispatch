name: OpenDispatch Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0-p16.0
        required: true
        type: string
      with_tests:
        description: Run tests while packaging release artifacts
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      offline_admin_deps:
        description: Include Admin UI production dependencies for offline on-prem startup
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

jobs:
  package:
    name: Build release package
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ai-event-gateway-admin-ui/package-lock.json

      - name: Verify release automation
        run: make verify

      - name: Run release CI gate
        run: make ci-release

      - name: Generate release notes
        run: make release-notes VERSION='${{ inputs.version }}'

      - name: Build release package
        run: |
          # P15 baseline command: make release-package; P16 offline command: make release-package-offline.
          target=release-package
          verify_args=""
          if [[ '${{ inputs.offline_admin_deps }}' == 'true' ]]; then
            target=release-package-offline
            verify_args="--offline"
          fi
          if [[ '${{ inputs.with_tests }}' == 'true' ]]; then
            make "${target}" VERSION='${{ inputs.version }}' RELEASE_ARGS='--with-tests'
          else
            make "${target}" VERSION='${{ inputs.version }}'
          fi
          echo "VERIFY_ARGS=${verify_args}" >> "${GITHUB_ENV}"

      - name: Verify release package
        run: |
          package_dir=.ci-output/releases/OpenDispatch-${{ inputs.version }}
          ${package_dir}/bin/verify-release-package.sh --package-dir ${package_dir}
          if [[ -n "${VERIFY_ARGS:-}" ]]; then
            .ci-output/releases/OpenDispatch-${{ inputs.version }}/bin/verify-release-package.sh --package-dir .ci-output/releases/OpenDispatch-${{ inputs.version }} ${VERIFY_ARGS}
          fi

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: OpenDispatch-${{ inputs.version }}
          path: |
            .ci-output/releases/OpenDispatch-${{ inputs.version }}.tar.gz
            .ci-output/releases/OpenDispatch-${{ inputs.version }}.tar.gz.sha256
            .ci-output/release-notes-${{ inputs.version }}.md
