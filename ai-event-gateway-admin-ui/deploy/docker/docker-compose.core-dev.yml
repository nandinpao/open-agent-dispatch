# Dev Core runtime against an existing PostgreSQL / Redis server.
# This compose file intentionally does not create PostgreSQL or run SQL installers.
# Schema lifecycle is managed by Flyway in the application / scripts/db/flyway-*.sh.
services:
  ai-event-gateway-core:
    build:
      context: ../..
      dockerfile: ai-event-gateway-core-app/Dockerfile
      args:
        EXPECTED_SHARED_UTILITY_VERSION: ${SHARED_UTILITY_VERSION:-1.0.0}
    image: ${AI_EVENT_GATEWAY_CORE_IMAGE:-ai-event-gateway-core:dev}
    container_name: ai-event-gateway-core-dev
    env_file:
      - ../env/.env.core-common.example
      - ../env/.env.core-dev.example
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}
      FLYWAY_VALIDATE_ON_MIGRATE: ${FLYWAY_VALIDATE_ON_MIGRATE:-true}
    ports:
      - "18080:18080"
